line_width: 100
tab_size: 2
max_subgroups_hwrap: 2
max_pargs_hwrap: 4
dangle_parens: true
dangle_align: prefix
separate_ctrl_name_with_space: false
separate_fn_name_with_space: false
command_case: unchanged
keyword_case: unchanged

additional_commands:
  cpmaddpackage:
    flags: []
    kwargs:
      NAME: 1
      GITHUB_REPOSITORY: 1
      GITLAB_REPOSITORY: 1
      VERSION: 1
      GIT_TAG: 1
      OPTIONS: +
